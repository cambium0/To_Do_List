async function doFetch(li_index) {

  if (updates['data'].length == 0) {
    return false
  }

  updates['session_id'] = data['session_id']

  document.getElementById('json_data').value = JSON.stringify(updates)

  url = "https://www.cambiumsoftware.com/flask_app_2/save_items"

  try {
    const response = await fetch(url, {
      method: 'POST', // Use POST for sending data
      body: JSON.stringify(updates), // Convert JS object to JSON string
      keepalive: true,
      headers: {
        'Content-Type': 'application/json', // Required for Flask to recognize JSON
      }
    });

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const result = await response.json(); // Parse the server's response
    
    console.log('Success:', result);

    //check for new list items and take action

    if (new_lists.length > 0) { 
        handle_new_lists()
    }

    updates = { 'session_id': data['session_id'], 'data': [] }
    

  } catch (error) {
    console.error('Error:', error);
  }

}


	function handle_new_lists() {
		unique_lists = Array.from(new Set(new_lists));
		for (let i = unique_lists.length = 1; i >= 0; i--) {
			var match = false
			for (const item of updates['data']) {
				if (unique_lists[i] == item['list_name']) {
					match = true
				}
			}
			if (!match) {
				unique_lists.splice(i, 1)
			}
		}
		

		if (unique_lists.length == 0) { return }
		else {
			//for (const listname of unique_lists) {

			//}

			sidebar_list = document.getElementById('sidebar_list')
			num_li = sidebar_list.getElementsByTagName('LI').length - 1
			li_tags = sidebar_list.getElementsByTagName('LI')

			for (var i=num_li;i>=1;i--) {
				try {
					sidebar_list.removeChild(li_tags[i])
				} catch (error) {
					console.error(error)
					continue
				}
			}	

			populate_sidebar()				
	
		}
		
	}

        function make_list_item(record) {    //record is just the dictionary that is the content of the list

	    }

		hours_span.style.color = "#ffa500"
	    }
	    else if (hrs_lft == 0) {
		new_item.style.backgroundColor = "#FFC0CB66"
	        hours_span.style.color = "FFC0CB"
	    }

        function calculate_hours_left(date_field) {
	    var my_date = ""
	    if (typeof date_field === 'string') {
	        my_date = date_field
	    }
	    else {
                my_date = date_field.value
	    }
	    const offsetInMilliseconds = new Date().getTimezoneOffset() * 60000
	    hours_left = ((new Date(my_date).getTime() - Date.now() + offsetInMilliseconds) / 3600000)
	    document.getElementById('hours_left').value = Math.floor(hours_left)
	    if (hours_left > 0) {
	        return Math.floor(hours_left)
	    }
	    else {
	        return 0
	    }

        }

        function mark_list_item(checkbx) {
            an_li = checkbx.parentNode
            li_field = checkbx.nextSibling
            todo_list = document.getElementById('todo_list_ul')
            li_field.style.textDecoration = li_field.style.textDecoration == 'line-through' ? 'none' : 'line-through'
            if (li_field.style.textDecoration == 'line-through') {
		todo_list.removeChild(an_li)
            	todo_list.appendChild(an_li)
	    }
	    item_text = li_field.value
	    //alert("'item_text' is " + item_text + ", li_field is " + li_field)

            //toggle item_done in local json
            record = ""
            for (var i=0;i<data['data'].length;i++) {
                if (data['data'][i]['list_name'] == document.getElementById('list_name').value && data['data'][i]['list_input'] == item_text) {
                    data['data'][i]['item_done'] = data['data'][i]['item_done'] == 'True' ? 'False' : 'True'
                    data['data'][i]['action'] = "update"
                    record = data['data'][i]
                }
            }
            //set item_done and action=upload in upload json
            record_present = "no"
            for (var i=0;i<updates['data'].length;i++) {
                if (updates['data'][i]['list_name'] == document.getElementById('list_name').value && updates['data'][i]['list_input'] == item_text) {
                    updates['data'][i]['action'] = "update"
                    updates['data'][i]['item_done'] = updates['data'][i]['item_done'] == 'True' ? 'False' : 'True'
                    record_present = "yes"
                }
            }
            if (record_present == "no") {
                updates['data'].unshift(record)
            }
        }

	async function query_save() {
	    if (updates['data'].length > 0) {
		userAccepted = confirm("This app is *stateless*. You must save your changes to keep them. Click Ok to save or Cancel to just logout.")
		if (userAccepted) {
	            alert("Ok! Submitting your changes then logging you out.")

		    const response = await doFetch()

		    const data = await response.json();

		    alert("All done! Logging you out.")

		    return true
		}
		else {
		    return true
		}
	    }
	}
	
	function delete_list(list_name, li_index) {

	    data_length = data['data'].length

	    for (let i = data_length - 1; i >=0; i--) {
		if (data['data'][i]['list_name'] == list_name) {
	            let item = data['data'].splice(i, 1)
		    updates['data'].push(item[0])
		}
	    }	

	    updates['data'].forEach((element) => {
		if (element['list_name'] == list_name) {
		    element['action'] = 'delete'
		}
	    })
		

	    if (document.getElementById('sidebar_list').children[li_index].children[1].style.color == 'cyan') {
        	ul = document.getElementById('todo_list_ul');
        	ul.replaceChildren(ul.firstElementChild);
	    }
	    //else {
		//alert("document.getElementById('sidebar_list').children[li_index].children[1].style.color != 'cyan'; li_index is " + li_index)
	    //}   
                                            
	    document.getElementById('sidebar_list').children[li_index].remove()

	    document.getElementById('list_name').value = ""

	    doFetch()

	}
